<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFRI PRO v6.1 | Corte Mensual</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #ff5722; --blue: #3498db; --green: #2ecc71; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: var(--dark); }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-bottom: 20px; }
        
        button { width: 100%; margin-top: 10px; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-outline { background: #eee; color: #555; }
        
        .alert-stock { background: #fff5f5; border-left: 5px solid #ff4d4d; padding: 10px; margin-bottom: 10px; border-radius: 8px; font-size: 13px; }
        .money { font-size: 20px; font-weight: bold; }
        .label-fin { font-size: 11px; color: #666; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .txt-red { color: #e74c3c; font-weight: bold; }

        input, select, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container" id="view-admin" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0;">Socio Administrativo</h2>
        <button onclick="handleLogout()" style="width:auto; background:#ff4d4d; color:white; padding:8px 12px; font-size:12px; border-radius:8px;">Salir</button>
    </div>

    <div id="alertas-stock-bajo"></div>

    <div class="card" style="padding: 15px;">
        <button class="btn-primary" style="height:60px;" onclick="showSection('view-scan')">📥 CARGAR FICHAS</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button class="btn-blue" onclick="showSection('view-inventario')">📦 VER STOCK</button>
            <button class="btn-outline" onclick="showSection('view-add-vendedor')">👥 VENDEDORES</button>
        </div>
    </div>
    
    <div class="card">
        <h3 style="margin-top:0;">Corte Acumulado (Día 20)</h3>
        <p style="font-size:12px; color:#777; margin-bottom:15px;">Dinero por cobrar desde el último corte:</p>
        <div id="admin-finanzas-lista"></div>
    </div>
</div>

<div class="container" id="view-vendedor" style="display:none">
    <div class="card" style="text-align:center;">
        <h2 id="vend-name" style="margin:0; color:var(--primary);">Vendedor</h2>
        <div style="background: #fffde7; border: 1px solid #fdd835; padding: 15px; border-radius: 15px; margin-top: 10px;">
            <div class="label-fin">💵 Acumulado a entregar (Neto)</div>
            <div class="money txt-red" id="v-a-entregar">$0.00</div>
        </div>
        <button class="btn-green" style="height:70px; margin-top:20px; background:var(--green); color:white;" onclick="showSection('view-vender-pin')">💸 VENDER PIN</button>
        <p id="v-stock-label" style="font-size:13px; color:#888; margin-top:15px;">Stock: 0 fichas</p>
        <button class="btn-outline" onclick="handleLogout()">Cerrar Sesión</button>
    </div>
</div>

<div class="container" id="view-login" style="display:none"><div class="card" style="text-align:center;"><h1>SAFRI PRO</h1><input id="login-email" type="email" placeholder="Correo"><input id="login-pass" type="password" placeholder="Contraseña"><button class="btn-primary" onclick="handleLogin()">ENTRAR</button></div></div>
<div class="container" id="view-scan" style="display:none"><div class="card"><h3>Cargar Fichas</h3><select id="scan-vendedor-select"></select><select id="scan-precio"><option value="10">Fichas $10</option><option value="25">Fichas $25</option></select><textarea id="texto-pins-batch" placeholder="Pega los códigos..."></textarea><button class="btn-primary" onclick="processTextBatch()">GUARDAR</button><button class="btn-outline" onclick="showSection('view-admin')">Volver</button></div></div>
<div class="container" id="view-vender-pin" style="display:none"><div class="card"><h3>Entregar Ficha</h3><input id="input-pin-vender" placeholder="Escribe el PIN" style="font-size:24px; text-align:center;"><button class="btn-green" onclick="confirmVenta()" style="background:var(--green); color:white;">REGISTRAR VENTA</button><button class="btn-outline" onclick="showSection('view-vendedor')">Cancelar</button></div></div>
<div class="container" id="view-inventario" style="display:none"><div class="card"><h3>Stock Disponible</h3><table id="tabla-inventario"><thead><tr><th>Vendedor</th><th>$10</th><th>$25</th></tr></thead><tbody></tbody></table><button class="btn-outline" onclick="showSection('view-admin')" style="margin-top:20px;">Volver</button></div></div>
<div class="container" id="view-add-vendedor" style="display:none"><div class="card"><h3>Nuevo Vendedor</h3><input id="new-vend-name" placeholder="Nombre"><input id="new-vend-email" placeholder="Correo"><input id="new-vend-pass" type="password" placeholder="Contraseña"><button class="btn-primary" onclick="addNewVendedor()">CREAR</button><button class="btn-outline" onclick="showSection('view-admin')">Volver</button></div></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyBAx5v07KT6gNgK1k04VEPGiJ_hsoIcX2w", authDomain: "safriapp-2f1db.firebaseapp.com", projectId: "safriapp-2f1db" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db = firebase.firestore();
let currentUser = null;
const PORCENTAJE_COMISION = 0.15;

// --- LÓGICA DE FECHAS (CORTE DÍA 20) ---
function getFechaInicioCorte() {
    let hoy = new Date();
    let inicio = new Date(hoy.getFullYear(), hoy.getMonth(), 20, 0, 0, 0);
    if (hoy.getDate() < 20) {
        inicio.setMonth(inicio.getMonth() - 1);
    }
    return inicio;
}

async function loadSocioFinanzas() {
    const contenedor = document.getElementById('admin-finanzas-lista');
    const alertaStock = document.getElementById('alertas-stock-bajo');
    contenedor.innerHTML = "Actualizando...";
    alertaStock.innerHTML = "";

    const fechaCorte = getFechaInicioCorte();

    const [vSnap, uSnap, fSnap] = await Promise.all([
        db.collection("ventas").where("fecha", ">=", fechaCorte).get(),
        db.collection("usuarios").where("tipo", "==", "vendedor").get(),
        db.collection("fichas").where("estado", "==", "disponible").get()
    ]);

    // Calcular ventas por vendedor
    let stats = {};
    vSnap.forEach(v => {
        let d = v.data();
        if(!stats[d.vendedor]) stats[d.vendedor] = 0;
        stats[d.vendedor] += d.precio;
    });

    // Calcular stock por vendedor
    let stock = {};
    fSnap.forEach(f => {
        let d = f.data();
        if(!stock[d.vendedor]) stock[d.vendedor] = 0;
        stock[d.vendedor]++;
    });

    contenedor.innerHTML = "";
    uSnap.forEach(u => {
        const n = u.data().nombre;
        const bruto = stats[n] || 0;
        const neto = bruto - (bruto * PORCENTAJE_COMISION);
        const cantStock = stock[n] || 0;

        // Mostrar alerta si quedan pocas fichas (< 5)
        if(cantStock < 5) {
            alertaStock.innerHTML += `<div class="alert-stock">⚠️ A <b>${n}</b> solo le quedan <b>${cantStock}</b> fichas.</div>`;
        }

        contenedor.innerHTML += `
            <div style="border-bottom:1px solid #eee; padding:10px 0;">
                <div style="display:flex; justify-content:space-between;">
                    <b>${n}</b>
                    <span class="txt-red">Recoger: $${neto.toFixed(2)}</span>
                </div>
                <div style="font-size:12px; color:#777;">Stock actual: ${cantStock} fichas</div>
            </div>`;
    });
}

// --- RESTO DE FUNCIONES (SIMPLIFICADAS) ---
function showSection(id) {
    document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    if(id === 'view-admin') loadSocioFinanzas();
    if(id === 'view-vendedor') updateVendedorFinanzas();
    if(id === 'view-inventario') loadInventario();
}

auth.onAuthStateChanged(user => {
    if (user) {
        db.collection("usuarios").doc(user.uid).get().then(doc => {
            currentUser = doc.data(); currentUser.uid = user.uid;
            showSection(currentUser.tipo === 'admin' ? 'view-admin' : 'view-vendedor');
            if(currentUser.tipo === 'admin') fillVendedoresDropdown();
        });
    } else { showSection('view-login'); }
});

async function updateVendedorFinanzas() {
    if(!currentUser) return;
    document.getElementById('vend-name').innerText = currentUser.nombre;
    const vSnap = await db.collection("ventas").where("vendedor", "==", currentUser.nombre).where("fecha", ">=", getFechaInicioCorte()).get();
    let bruto = 0; vSnap.forEach(d => bruto += d.data().precio);
    document.getElementById('v-a-entregar').innerText = "$" + (bruto - (bruto * PORCENTAJE_COMISION)).toFixed(2);
    const sSnap = await db.collection("fichas").where("vendedor", "==", currentUser.nombre).where("estado", "==", "disponible").get();
    document.getElementById('v-stock-label').innerText = "Stock: " + sSnap.size + " fichas";
}

async function processTextBatch() {
    const text = document.getElementById('texto-pins-batch').value;
    const vend = document.getElementById('scan-vendedor-select').value;
    const precio = parseInt(document.getElementById('scan-precio').value);
    const pins = text.match(/[a-zA-Z0-9]{4,10}/g) || [];
    const batch = db.batch();
    pins.filter(p => p.toLowerCase() !== 'pin').forEach(p => batch.set(db.collection("fichas").doc(), { pin: p, vendedor: vend, precio: precio, estado: "disponible", fecha: new Date() }));
    await batch.commit();
    alert("Cargados!"); showSection('view-admin');
}

async function confirmVenta() {
    const pin = document.getElementById('input-pin-vender').value.trim();
    const snap = await db.collection("fichas").where("pin", "==", pin).where("vendedor", "==", currentUser.nombre).where("estado", "==", "disponible").get();
    if(snap.empty) return alert("PIN no disponible.");
    await snap.docs[0].ref.update({ estado: "vendida", fechaVenta: new Date() });
    await db.collection("ventas").add({ pin: pin, vendedor: currentUser.nombre, precio: snap.docs[0].data().precio, fecha: new Date() });
    alert("Vendido"); document.getElementById('input-pin-vender').value = ""; showSection('view-vendedor');
}

async function loadInventario() {
    const tbody = document.querySelector('#tabla-inventario tbody'); tbody.innerHTML = "";
    const snap = await db.collection("fichas").where("estado", "==", "disponible").get();
    let st = {}; snap.forEach(f => {
        let d = f.data(); if(!st[d.vendedor]) st[d.vendedor] = {s10:0, s25:0};
        d.precio == 10 ? st[d.vendedor].s10++ : st[d.vendedor].s25++;
    });
    for(let v in st) tbody.innerHTML += `<tr><td>${v}</td><td>${st[v].s10}</td><td>${st[v].s25}</td></tr>`;
}

function fillVendedoresDropdown() {
    db.collection("usuarios").where("tipo", "==", "vendedor").get().then(snap => {
        const sel = document.getElementById('scan-vendedor-select'); sel.innerHTML = "";
        snap.forEach(doc => { const opt = document.createElement('option'); opt.value = opt.text = doc.data().nombre; sel.appendChild(opt); });
    });
}
function handleLogin() { auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value); }
function handleLogout() { auth.signOut(); }
function addNewVendedor() {
    const n = document.getElementById('new-vend-name').value;
    auth.createUserWithEmailAndPassword(document.getElementById('new-vend-email').value, document.getElementById('new-vend-pass').value).then(res => {
        db.collection("usuarios").doc(res.user.uid).set({ nombre: n, tipo: "vendedor" });
        alert("Creado"); showSection('view-admin');
    });
}
</script>
</body>
</html>
