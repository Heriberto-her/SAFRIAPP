<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema de Fichas</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#1e1b4b,#0ea5e9);
color:white;
margin:0;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Vendedor</h2>
<input id="vendedor" placeholder="Nombre del vendedor">
<button onclick="guardarVendedor()">Guardar</button>
</div>

<div class="card">
<h2>Escanear QR (20 horas)</h2>
<div id="reader"></div>
</div>

<div class="card">
<h2>Ingresar PIN manual (10 horas)</h2>
<input id="pinManual" placeholder="Escribe el PIN">
<button onclick="registrarManual()">Registrar PIN</button>
</div>

</div>

<script>

// 🔥 FIREBASE (TU CONFIG)
const firebaseConfig = {
 apiKey: "AIzaSyBAx5v07KT6gNgK1k04VEPGiJ_hsoIcX2w",
 authDomain: "safriapp-2f1db.firebaseapp.com",
 projectId: "safriapp-2f1db"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 👤 GUARDAR VENDEDOR
function guardarVendedor(){
  let v = document.getElementById("vendedor").value;
  localStorage.setItem("vendedor", v);
  alert("Vendedor guardado");
}

// 📷 ESCANEAR QR
function onScanSuccess(decodedText) {

  let vendedor = localStorage.getItem("vendedor") || "sin_nombre";

  let pin = decodedText.trim();

  let match = pin.match(/[a-z0-9]{5,8}/i);
  if(!match){
    alert("PIN no válido");
    return;
  }

  pin = match[0];

  guardarVenta(pin, vendedor);
}

// ✍️ REGISTRO MANUAL
function registrarManual(){

  let vendedor = localStorage.getItem("vendedor") || "sin_nombre";
  let pin = document.getElementById("pinManual").value.trim();

  let match = pin.match(/[a-z0-9]{5,8}/i);
  if(!match){
    alert("PIN no válido");
    return;
  }

  pin = match[0];

  guardarVenta(pin, vendedor);
}

// 💾 GUARDAR EN FIREBASE
function guardarVenta(pin, vendedor){

  db.collection("ventas").add({
    pin: pin,
    vendedor: vendedor,
    fecha: new Date()
  });

  alert("Registrado: " + pin);
}

// 🚀 INICIAR CAMARA
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if(devices.length){
    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  }
});

</script>

</body>
</html>
