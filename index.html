<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFRI PRO v6.0 | Sistema Integral</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #ff5722; --blue: #3498db; --green: #2ecc71; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: var(--dark); }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-bottom: 20px; }
        
        button { width: 100%; margin-top: 10px; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-outline { background: #eee; color: #555; }
        
        .finanzas-box { background: #fffde7; border: 1px solid #fdd835; padding: 15px; border-radius: 15px; margin-top: 10px; }
        .money { font-size: 20px; font-weight: bold; }
        .label-fin { font-size: 11px; color: #666; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .txt-green { color: var(--green); }
        .txt-red { color: #e74c3c; }

        input, select, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loadingOverlay"><p>Cargando...</p></div>

<div class="container" id="view-login" style="display:none">
    <div class="card" style="text-align: center; margin-top: 50px;">
        <h1 style="color:var(--primary);">SAFRI PRO</h1>
        <input id="login-email" type="email" placeholder="Correo">
        <input id="login-pass" type="password" placeholder="Contraseña">
        <button class="btn-primary" onclick="handleLogin()">INICIAR SESIÓN</button>
    </div>
</div>

<div class="container" id="view-admin" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0;">Socio Administrativo</h2>
        <button onclick="handleLogout()" style="width:auto; background:#ff4d4d; color:white; padding:8px 12px; font-size:12px;">Salir</button>
    </div>

    <div class="card" style="padding: 15px;">
        <button class="btn-primary" style="height:60px;" onclick="showSection('view-scan')">📥 CARGAR NUEVAS FICHAS</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button class="btn-blue" onclick="showSection('view-inventario')">📦 VER STOCK</button>
            <button class="btn-outline" onclick="showSection('view-add-vendedor')">👥 VENDEDORES</button>
        </div>
    </div>
    
    <div class="card">
        <h3 style="margin-top:0;">Corte de Caja (Hoy)</h3>
        <p style="font-size:12px; color:#777; margin-bottom:15px;">Dinero que debes cobrar a tus vendedores:</p>
        <div id="admin-finanzas-lista">
            </div>
    </div>
</div>

<div class="container" id="view-vendedor" style="display:none">
    <div class="card" style="text-align:center;">
        <h2 id="vend-name" style="margin:0; color:var(--primary);">Vendedor</h2>
        <div class="finanzas-box">
            <div class="label-fin">💵 Mis Ventas Brutas</div>
            <div class="money" id="v-total-bruto">$0.00</div>
            <div style="display:flex; justify-content: space-around; margin-top:10px; border-top:1px solid #ddd; padding-top:10px;">
                <div><div class="label-fin">Comisión</div><div class="money txt-green" id="v-mi-comision">$0.00</div></div>
                <div><div class="label-fin">A Entregar</div><div class="money txt-red" id="v-a-entregar">$0.00</div></div>
            </div>
        </div>
        <button class="btn-green" style="height:70px; margin-top:20px;" onclick="showSection('view-vender-pin')">💸 VENDER PIN</button>
        <p id="v-stock-label" style="font-size:13px; color:#888; margin-top:15px;">Stock: 0 fichas</p>
        <button class="btn-outline" onclick="handleLogout()">Cerrar Sesión</button>
    </div>
</div>

<div class="container" id="view-scan" style="display:none">
    <div class="card">
        <h3>Cargar Fichas</h3>
        <label>Vendedor:</label><select id="scan-vendedor-select"></select>
        <label>Precio:</label><select id="scan-precio"><option value="10">Fichas $10</option><option value="25">Fichas $25</option></select>
        <textarea id="texto-pins-batch" placeholder="Pega aquí los códigos..."></textarea>
        <button class="btn-primary" onclick="processTextBatch()">GUARDAR CÓDIGOS</button>
        <button class="btn-outline" onclick="showSection('view-admin')">Volver al Panel</button>
    </div>
</div>

<div class="container" id="view-vender-pin" style="display:none">
    <div class="card">
        <h3>Entregar Ficha</h3>
        <input id="input-pin-vender" placeholder="Escribe el PIN aquí" style="font-size:24px; text-align:center;">
        <button class="btn-green" onclick="confirmVenta()">REGISTRAR VENTA</button>
        <button class="btn-outline" onclick="showSection('view-vendedor')">Cancelar</button>
    </div>
</div>

<div class="container" id="view-inventario" style="display:none">
    <div class="card">
        <h3>Stock Disponible</h3>
        <table id="tabla-inventario">
            <thead><tr><th>Vendedor</th><th>$10</th><th>$25</th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn-outline" onclick="showSection('view-admin')" style="margin-top:20px;">Volver</button>
    </div>
</div>

<div class="container" id="view-add-vendedor" style="display:none">
    <div class="card">
        <h3>Nuevo Vendedor</h3>
        <input id="new-vend-name" placeholder="Nombre">
        <input id="new-vend-email" type="email" placeholder="Correo">
        <input id="new-vend-pass" type="password" placeholder="Contraseña">
        <button class="btn-primary" onclick="addNewVendedor()">REGISTRAR VENDEDOR</button>
        <button class="btn-outline" onclick="showSection('view-admin')">Volver</button>
    </div>
</div>

<script>
// --- CONFIGURACIÓN ---
const firebaseConfig = { apiKey: "AIzaSyBAx5v07KT6gNgK1k04VEPGiJ_hsoIcX2w", authDomain: "safriapp-2f1db.firebaseapp.com", projectId: "safriapp-2f1db" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db = firebase.firestore();

let currentUser = null;
const PORCENTAJE_COMISION = 0.15;

function showSection(id) {
    document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    if(id === 'view-admin') loadSocioFinanzas();
    if(id === 'view-vendedor') updateVendedorFinanzas();
    if(id === 'view-inventario') loadInventario();
}

auth.onAuthStateChanged(user => {
    if (user) {
        db.collection("usuarios").doc(user.uid).get().then(doc => {
            currentUser = doc.data(); currentUser.uid = user.uid;
            showSection(currentUser.tipo === 'admin' ? 'view-admin' : 'view-vendedor');
            if(currentUser.tipo === 'admin') fillVendedoresDropdown();
        });
    } else { showSection('view-login'); }
});

// --- LÓGICA DE CARGA ---
async function processTextBatch() {
    const text = document.getElementById('texto-pins-batch').value;
    const vend = document.getElementById('scan-vendedor-select').value;
    const precio = parseInt(document.getElementById('scan-precio').value);
    const pins = text.match(/[a-zA-Z0-9]{4,10}/g) || [];
    const filtrados = pins.filter(p => p.toLowerCase() !== 'pin');

    if(filtrados.length === 0) return alert("Pega los códigos primero.");
    const batch = db.batch();
    filtrados.forEach(p => batch.set(db.collection("fichas").doc(), { pin: p, vendedor: vend, precio: precio, estado: "disponible", fecha: new Date() }));
    await batch.commit();
    alert("✅ " + filtrados.length + " fichas cargadas.");
    document.getElementById('texto-pins-batch').value = "";
    showSection('view-admin');
}

// --- LÓGICA DE FINANZAS ---
async function loadSocioFinanzas() {
    const contenedor = document.getElementById('admin-finanzas-lista');
    contenedor.innerHTML = "Actualizando...";
    const hoy = new Date(); hoy.setHours(0,0,0,0);

    const [vSnap, uSnap] = await Promise.all([
        db.collection("ventas").where("fecha", ">=", hoy).get(),
        db.collection("usuarios").where("tipo", "==", "vendedor").get()
    ]);

    let stats = {};
    vSnap.forEach(v => {
        const d = v.data();
        if(!stats[d.vendedor]) stats[d.vendedor] = 0;
        stats[d.vendedor] += d.precio;
    });

    contenedor.innerHTML = "";
    uSnap.forEach(u => {
        const n = u.data().nombre;
        const bruto = stats[n] || 0;
        const neto = bruto - (bruto * PORCENTAJE_COMISION);
        contenedor.innerHTML += `
            <div style="border-bottom:1px solid #eee; padding:10px 0;">
                <div style="display:flex; justify-content:space-between;">
                    <b>${n}</b>
                    <span class="txt-red">Recoger: $${neto.toFixed(2)}</span>
                </div>
                <div style="font-size:12px; color:#777;">Vendido: $${bruto.toFixed(2)}</div>
            </div>`;
    });
}

async function updateVendedorFinanzas() {
    if(!currentUser) return;
    document.getElementById('vend-name').innerText = currentUser.nombre;
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const vSnap = await db.collection("ventas").where("vendedor", "==", currentUser.nombre).where("fecha", ">=", hoy).get();
    let bruto = 0; vSnap.forEach(d => bruto += d.data().precio);
    const com = bruto * PORCENTAJE_COMISION;
    document.getElementById('v-total-bruto').innerText = "$" + bruto.toFixed(2);
    document.getElementById('v-mi-comision').innerText = "$" + com.toFixed(2);
    document.getElementById('v-a-entregar').innerText = "$" + (bruto - com).toFixed(2);
}

async function loadInventario() {
    const tbody = document.querySelector('#tabla-inventario tbody');
    tbody.innerHTML = "";
    const snap = await db.collection("fichas").where("estado", "==", "disponible").get();
    let st = {};
    snap.forEach(f => {
        let d = f.data(); if(!st[d.vendedor]) st[d.vendedor] = {s10:0, s25:0};
        if(d.precio == 10) st[d.vendedor].s10++; else st[d.vendedor].s25++;
    });
    for(let v in st) tbody.innerHTML += `<tr><td>${v}</td><td>${st[v].s10}</td><td>${st[v].s25}</td></tr>`;
}

// --- OTROS ---
function fillVendedoresDropdown() {
    db.collection("usuarios").where("tipo", "==", "vendedor").get().then(snap => {
        const sel = document.getElementById('scan-vendedor-select');
        sel.innerHTML = "";
        snap.forEach(doc => {
            const opt = document.createElement('option');
            opt.value = opt.text = doc.data().nombre;
            sel.appendChild(opt);
        });
    });
}
async function confirmVenta() {
    const pin = document.getElementById('input-pin-vender').value.trim();
    const snap = await db.collection("fichas").where("pin", "==", pin).where("vendedor", "==", currentUser.nombre).where("estado", "==", "disponible").get();
    if(snap.empty) return alert("PIN no disponible.");
    const docF = snap.docs[0];
    await docF.ref.update({ estado: "vendida", fechaVenta: new Date() });
    await db.collection("ventas").add({ pin: pin, vendedor: currentUser.nombre, precio: docF.data().precio, fecha: new Date() });
    alert("✅ Vendido"); document.getElementById('input-pin-vender').value = ""; showSection('view-vendedor');
}
function handleLogin() { auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value); }
function handleLogout() { auth.signOut(); }
function addNewVendedor() {
    const n = document.getElementById('new-vend-name').value;
    const e = document.getElementById('new-vend-email').value;
    const p = document.getElementById('new-vend-pass').value;
    auth.createUserWithEmailAndPassword(e, p).then(res => {
        db.collection("usuarios").doc(res.user.uid).set({ nombre: n, tipo: "vendedor" });
        alert("¡Vendedor creado!"); showSection('view-admin');
    });
}
</script>
</body>
</html>
